name: "\U0001F680 Feature request"
description: You have a neat idea that should be implemented?
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What problem does this feature solve? Why is it needed?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What should be implemented?
    validations:
      required: true
